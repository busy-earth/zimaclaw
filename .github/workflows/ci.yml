name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Zig
        run: bash ./scripts/bootstrap-zig.sh

      - name: Add Zig to PATH
        run: echo "$GITHUB_WORKSPACE/.toolchain/zig/current" >> "$GITHUB_PATH"

      - name: Run build and tests
        run: zig build test --summary all
